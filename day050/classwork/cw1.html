<!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
            .container{
                width: 800px;
                height: 800px;
                background-color: #09ed49;
                padding: 10px;
                display: grid;
                grid-template-columns: repeat(auto auto auto, 1fr);
            }
            .opaque{
                 background-color: #ffffff;
                margin: 10px;
                padding: 10px;
               
            }
        </style>
 </head>
 <body>
        <div class="container">
            <div class="opaque"></div>
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
        </div>
 </body>
 </html>
