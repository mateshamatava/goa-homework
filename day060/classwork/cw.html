<!-- შექმენით რამე ელემენტი, ჯერ ჩავიდეს ქვემოთ, მერე მარჯვნივ 200 პიქსელით, ზომა ორჯერ გაიზარდოს და დაუბრუნდეს საწყის პოზიციას -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <style>
        @media screen and (max-width: 600px) {
            .box {
                width: 100px;
                height: 100px;
                background-color: rgb(13, 29, 211);
                animation: box 4s ease-in-out infinite;
            }

            @keyframes box{
                0% {
                
                    transform: translateX(0 ,0) scale(1);
                }
                25% {
                    transform: translateY(200px);
                }
                50% {
                    transform: translateX(200px, 200px);
                }
                75% {
                    transform: translateX(200px,200px) scale(2);
                }
                100% {
                    transform: translateX(0,0) scale(1);
                }
            }
        }
        </style>
 </body>
 </html>
